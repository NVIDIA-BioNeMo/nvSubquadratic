name: GPU tests

# `gpu-tests` is a *required* status check on `main` (repo ruleset). It runs on
# every PR (no path filter) so the required status is always reported — a
# path-filtered required check never reports on non-matching PRs and blocks
# merge forever ("Expected — waiting for status to be reported").

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel in-flight runs for the same PR/branch when a new commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Runs on a self-hosted Colossus GPU runner; provisioning is out-of-tree.
  # GHCR registry cache means even a fresh runner skips the Apex compile (~30 min)
  # by pulling cached layers. Warm runs (code-only changes) are ~5 min.
  gpu-tests:
    runs-on: [self-hosted, gpu, colossus]
    timeout-minutes: 120
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure build cache
        uses: int128/docker-build-cache-config-action@v1
        id: cache
        with:
          image: ghcr.io/nvidia-bionemo/nvsubquadratic-private/ci-cache

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          build-args: |
            TORCH_CUDA_ARCH_LIST=9.0
          tags: |
            nvsubquadratic-ci:${{ github.sha }}
            nvsubquadratic-ci:latest
          cache-from: |
            ${{ steps.cache.outputs.cache-from }}
            type=registry,ref=ghcr.io/nvidia-bionemo/nvsubquadratic-private/ci-cache:main
          cache-to: ${{ steps.cache.outputs.cache-to }}

      - name: Run pytest
        run: |
          docker run --rm --gpus all \
            nvsubquadratic-ci:${{ github.sha }} \
            python -m pytest nvsubquadratic/ tests/ -v --tb=short

      - name: Run distributed CP tests
        run: |
          GPU_COUNT=$(docker run --rm --gpus all \
            nvsubquadratic-ci:${{ github.sha }} \
            python -c "import torch; print(torch.cuda.device_count())")
          if [ "$GPU_COUNT" -ge 2 ]; then
            docker run --rm --gpus all \
              nvsubquadratic-ci:${{ github.sha }} \
              torchrun --nproc_per_node=2 \
                tests/modules/torchrun_sequence_mixer_cp_test.py \
                --context_parallel_size=2 --dtype=float32
          else
            echo "Skipping distributed tests: $GPU_COUNT GPU(s) available, need 2+"
          fi

      - name: Clean up old images
        if: always()
        run: docker image prune -f --filter "until=24h"
