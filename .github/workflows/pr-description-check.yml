name: PR Description Check

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  check-description:
    runs-on: ubuntu-latest

    steps:
      - name: Check PR description for pre-commit pass
        run: |
          BODY="${{ github.event.pull_request.body }}"

          _how_to_run() {
            echo "How to run pre-commit (including pre-push hooks):"
            echo "  pre-commit install"
            echo "  pre-commit install --hook-type pre-push"
            echo "  # Hooks run on git push. To run the same checks without pushing:"
            echo "  pre-commit run --hook-stage pre-push --all-files"
            echo "Then note in the PR description that pre-commit passed (any short phrase is fine)."
          }

          if [ -z "$BODY" ]; then
            echo "❌ PR description is empty."
            echo ""
            _how_to_run
            exit 1
          fi

          if ! printf '%s' "$BODY" | tr '\n' ' ' | grep -iq "pre-commit.*passed"; then
            echo "❌ PR description must state pre-commit passed (e.g. \"pre-commit ... passed\")."
            echo ""
            _how_to_run
            exit 1
          fi

          echo "✅ PR description confirms pre-commit passed"
