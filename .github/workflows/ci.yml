name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-flight runs for the same PR/branch when a new commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  # Runs on GitHub-hosted runner — no GPU needed, fast feedback.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run pre-commit (commit-stage hooks)
        run: |
          pip install pre-commit
          # Runs: trailing-whitespace, check-yaml, ruff, mdformat, detect-secrets
          # Does NOT run pytest-pre-push / torchrun-cp-tests (those are pre-push stage)
          pre-commit run --all-files --hook-stage commit

  # ── GPU tests ───────────────────────────────────────────────────────────────
  # Runs on a self-hosted Colossus machine provisioned via the Ansible playbook.
  # Docker layer caching on the runner means only the last few layers rebuild
  # on code changes (~1-2 min). Apex and heavy deps are cached permanently.
  gpu-tests:
    runs-on: [self-hosted, gpu, colossus]
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build -t nvsubquadratic-ci:${{ github.sha }} \
                       -t nvsubquadratic-ci:latest \
                       --cache-from nvsubquadratic-ci:latest \
                       .

      - name: Run pytest
        run: |
          docker run --rm --gpus all \
            nvsubquadratic-ci:${{ github.sha }} \
            python -m pytest nvsubquadratic/ tests/ -v --tb=short \
              --ignore=tests/test_h5_caching.py \
              --ignore=tests/test_well_staging_ddp.py

      - name: Run distributed CP tests
        run: |
          GPU_COUNT=$(docker run --rm --gpus all \
            nvsubquadratic-ci:${{ github.sha }} \
            python -c "import torch; print(torch.cuda.device_count())")
          if [ "$GPU_COUNT" -ge 2 ]; then
            docker run --rm --gpus all \
              nvsubquadratic-ci:${{ github.sha }} \
              torchrun --nproc_per_node=2 \
                tests/modules/torchrun_sequence_mixer_cp_test.py \
                --context_parallel_size=2 --dtype=float32
          else
            echo "Skipping distributed tests: $GPU_COUNT GPU(s) available, need 2+"
          fi

      - name: Clean up old images
        if: always()
        run: docker image prune -f --filter "until=24h"
