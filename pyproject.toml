[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "nvsubquadratic"
version = "0.1.0"
description = "A unified PyTorch-native library for subquadratic alternatives to quadratic attention method"
requires-python = ">=3.11"
dependencies = [
    "torch>=2.0.0",
    "einops>=0.6.0",
    "numpy>=1.21.0",
    "datasets>=2.14.0",
    "diffusers>=0.25.0",
    "megatron-core",
    "pytorch-lightning>=2.0.0",
    "omegaconf>=2.3.0",
    "wandb>=0.15.0",
    "rich>=13.0.0",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["nvsubquadratic*"]

[tool.ruff]
line-length = 119

[tool.ruff.lint]
ignore = ["C901", "D100", "E501", "E741", "RUF005", "RUF010"]
select = [
    "C",   # Pylint conventions
    "D",   # Documentation formatting
    "E",   # style stuff, whitespaces
    "F",   # important pyflakes lints
    "I",   # import sorting
    "RUF", # Some Ruff-specific lints, unused noqas, etc.
    "W",   # Pylint warnings
]

# Ignore import violations in all `__init__.py` files.
[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["D104", "E402", "F401", "F403", "F811"]
"test_*.py" = ["D"]
"conftest.py" = ["D"]
"scripts/*.py" = ["D"]
"**/*.ipynb" = ["D"]

[tool.ruff.lint.isort]
lines-after-imports = 2
known-first-party = ["nvsubquadratic"]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.pytest.ini_options]
xfail_strict = true
addopts = [
    "--durations-min=30.0",
    "--durations=0",
    "--cov=nvsubquadratic",
    "--cov-report=term",
]
markers = ["slow: marks tests as slow (deselect with '-m \"not slow\"')"]
