repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v2.3.0
    hooks:
      - id: trailing-whitespace
      - id: check-yaml
        exclude: "mkdocs.yml"
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.8
    hooks:
      - id: ruff
        # 1. Attempt to automatically fix any lint issues.
        args: ["--fix"]
      - id: ruff-format
  - repo: https://github.com/executablebooks/mdformat
    rev: 0.7.17 # Use the latest stable version
    hooks:
      - id: mdformat
        additional_dependencies:
          - mdformat-tables
          - mdformat-gfm
          - mdformat-black
          - mdformat-frontmatter
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: detect-secrets (everything but notebooks)
        args:
          [
            "--baseline",
            ".secrets.baseline",
            "--exclude-files",
            '(.*\.ipynb|.*\.baseline)$',
          ]
        exclude: package.lock.json
      - id: detect-secrets
        name: detect-secrets (notebooks only)
        args:
          [
            "--baseline",
            ".secrets-nb.baseline",
            "--exclude-files",
            '^.(?!.*\.ipynb)',
            "--exclude-lines",
            '"(hash|id|image/\w+)":.*|<.*at 0x[0-9a-f]+>|object at 0x[0-9a-f]+',
          ]
  - repo: local
    hooks:
      - id: license-check
        name: License header check
        entry: python scripts/license_check.py
        language: system
        files: \.py$
        args:
          [
            --check-dirs,
            nvsubquadratic/,
            --check-dirs,
            tests/,
            --check-dirs,
            examples/,
          ]
        pass_filenames: false
        always_run: false
        description: Ensure all Python files have proper NVIDIA license headers
        stages: [manual]  # Only run license check when explicitly invoked.
      - id: pytest-pre-push
        name: pytest-pre-push
        # Write coverage to /tmp so the hook does not modify any file in the repo (avoids "files were modified" failure).
        # Apptainer/docker: set LD_LIBRARY_PATH/TRITON_LIBCUDA_PATH when cuda libs are in non-default locations.
        entry: bash -c 'LIBCUDA_DIR=""; for cand in /.singularity.d/libs /usr/local/cuda/compat/lib; do if [ -f "$cand/libcuda.so.1" ]; then LIBCUDA_DIR="$cand"; break; fi; done; if [ -n "$LIBCUDA_DIR" ]; then export LD_LIBRARY_PATH="$LIBCUDA_DIR:${LD_LIBRARY_PATH}"; export TRITON_LIBCUDA_PATH="$LIBCUDA_DIR/libcuda.so.1"; fi; export COVERAGE_FILE=/tmp/.coverage_prepush; echo "Running tests before push..."; python -m pytest nvsubquadratic/ tests/ -v --tb=short --ignore=tests/test_h5_caching.py --ignore=tests/test_well_staging_ddp.py'
        language: system
        stages: [pre-push]
        pass_filenames: false
      - id: torchrun-cp-tests
        name: torchrun-cp-tests (1D, 2D, 3D)
        entry: bash -c 'if [ $(python -c "import torch; print(torch.cuda.device_count())") -ge 2 ]; then echo "Running distributed CP tests for all dimensions..." && torchrun --nproc_per_node=2 tests/modules/torchrun_sequence_mixer_cp_test.py --context_parallel_size=2 --dtype=float32; else echo "Skipping torchrun tests (requires 2+ GPUs)"; fi'
        language: system
        stages: [pre-push]
        pass_filenames: false
        always_run: true
