# Config for training LMTransformer on FineWeb Edu 10BT
# This uses the native Lingua transformer (no modern_ccnn_config_path)
name: "transformer_fineweb_train"
steps: 400000
probe_freq: null  # Probing not enabled (requires disabling activation checkpointing)
grad_acc_steps: 4
seed: 42

optim:
    lr: 3e-4
    warmup: 2000
    lr_min_ratio: 0.000001
    clip: 1.0

distributed:
    fsdp_type: full_shard
    compile: true
    model_dtype: bf16
    matmul_allow_tf32: true
    selective_activation_checkpointing: true  # Enabled for memory efficiency
    tp_size: 1

model:
    # ~150M parameter transformer (similar scale to Hyena for comparison)
    dim: 768
    n_layers: 12
    n_heads: 12
    # No modern_ccnn_config_path -> uses native LMTransformer

data:
    root_dir: "data"
    sources:
        fineweb_edu_10bt_shuffled: 1.0
    batch_size: 2

    prefetch_size: 64
    seq_len: 2048
    n_views: 2
    load_async: true
    add_bos: true
    add_eos: true
    tokenizer:
        name: "nvidia/Mistral-NeMo-Minitron-8B-Base"

profiling:
    run: false

checkpoint:
    dump:
        every: 1000
        keep: 3
    eval:
        every: 1000
        keep: 1

logging:
    freq: 10
    wandb:
        project: "lingua-hyena"
        entity: "dafidofff"

eval:
    generator:
        max_tokens: 1024
        dtype: bf16
        temperature: 1.0
        top_p: 0.95
    harness:
        tasks:
            - hellaswag
            - arc_easy
    validation:
        max_steps: 100
