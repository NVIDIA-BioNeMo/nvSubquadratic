# Config for training Hyena on FineWeb Edu 10BT - Balanced Batch Size
name: "hyena_fineweb_train_balanced"
steps: 400000
grad_acc_steps: 4
probe_freq: 100
seed: 42

optim:
    lr: 3e-4
    warmup: 2000
    lr_min_ratio: 0.000001
    clip: 0.5

distributed:
    fsdp_type: full_shard
    compile: true
    model_dtype: bf16
    matmul_allow_tf32: true
    selective_activation_checkpointing: false
    tp_size: 1

model:
    # These will be overridden by the wrapper using the config file of
    # the nvSubquadratic config.
    dim: 1024
    n_layers: 8
    n_heads: 8
    # Path to the user's model config (relative to project root)
    modern_ccnn_config_path: "examples/text_pretraining/zyda_1d_hyena.py"

data:
    root_dir: "data"
    sources:
        fineweb_edu_10bt_shuffled: 1.0
    batch_size: 4
    prefetch_size: 64
    seq_len: 2048
    n_views: 2
    load_async: true
    tokenizer:
        name: "nvidia/Mistral-NeMo-Minitron-8B-Base"

profiling:
    run: false

checkpoint:
    dump:
        every: 1000
        keep: 3
    eval:
        every: 1000
        keep: 1

logging:
    freq: 10
    wandb:
        project: "lingua-hyena"
        entity: "dafidofff"

eval:
    generator:
        max_tokens: 1024
        dtype: bf16
        temperature: 1.0
        top_p: 0.95
    harness:
        tasks:
            - hellaswag
            - arc_easy
    validation:
        max_steps: 100
