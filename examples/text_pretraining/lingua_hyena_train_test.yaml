# Config for testing Hyena text pre-training on FineWeb Edu 10BT
# Reduced steps for quick validation
name: "hyena_fineweb_test"
dump_dir: "./runs/"
steps: 1000
probe_freq: 100
seed: 42

optim:
    lr: 3e-4
    warmup: 100
    lr_min_ratio: 0.000001
    clip: 0.5

distributed:
    fsdp_type: full_shard
    compile: true
    model_dtype: bf16
    matmul_allow_tf32: true
    selective_activation_checkpointing: false
    tp_size: 1

model:
    dim: 768
    n_layers: 12
    n_heads: 8
    # Path to the user's model config (relative to project root)
    modern_ccnn_config_path: "examples/text_pretraining/zyda_1d_hyena.py"

data:
    root_dir: "/ivi/zfs/s0/original_homes/dwessel/data"
    sources:
        fineweb_edu_10bt_shuffled: 1.0
    batch_size: 4
    prefetch_size: 64
    seq_len: 2048
    n_views: 2
    load_async: true
    tokenizer:
        name: "nvidia/Mistral-NeMo-Minitron-8B-Base"

profiling:
    run: false

checkpoint:
    dump:
        every: 200
        keep: 3
    eval:
        every: 500
        keep: 1

logging:
    freq: 10
    wandb:
        project: "lingua-hyena"
        entity: "dafidofff"

eval:
    generator:
        max_tokens: 512
        dtype: bf16
        temperature: 1.0
        top_p: 0.95
    validation:
        max_steps: 50
